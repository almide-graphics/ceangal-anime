<!DOCTYPE html>
<html>
<head>
  <title>ceangal-anime</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a12; color: #fff; font-family: monospace; overflow: hidden; }
    .tabs { display: flex; gap: 8px; padding: 16px 24px; flex-wrap: wrap; }
    .tab { padding: 6px 14px; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; cursor: pointer; color: #888; font: 11px monospace; transition: all 0.15s; }
    .tab.active { background: #2a2a4e; color: #fff; border-color: #6366f1; }
    .tab:hover { border-color: #555; }
    canvas { display: block; margin: 0 auto; }
  </style>
</head>
<body>
<div class="tabs">
  <div class="tab active" onclick="go(0)">Morph</div>
  <div class="tab" onclick="go(1)">Easing</div>
  <div class="tab" onclick="go(2)">Grid</div>
  <div class="tab" onclick="go(3)">Fireworks</div>
  <div class="tab" onclick="go(4)">Wave</div>
  <div class="tab" onclick="go(5)">Camera</div>
</div>
<canvas id="c"></canvas>
<script>
const N = (b) => Number(b), B = (n) => BigInt(n);
let demo = 0, ex;
const DEMOS = ["scene_morph", "scene_easing", "scene_grid", "scene_fireworks", "scene_wave", "scene_camera"];
const SHAPES = ["circle", "square", "star", "spiral", "random"];
const LABELS = [
  ["Morph", "click to morph — 200 particles, elastic stagger"],
  ["Easing Curves", "10 easings — all computed in WASM"],
  ["Stagger Grid", "12x12 elastic stagger from center"],
  ["Fireworks", "144 particles — elastic radial burst"],
  ["Wave", "responsive bar waveform — sequential stagger"],
  ["Camera", "6x6x3 3D grid — orbit + perspective projection"],
];
const EASE_NAMES = [
  "linear","outCubic","inOutQuad","outElastic","outBounce",
  "inOutBack","outExpo","inOutSine","outQuart","inCirc"
];
const PAL = ["#6366f1","#8b5cf6","#a78bfa","#c084fc","#e879f9",
  "#f472b6","#fb7185","#f97316","#eab308","#22d3ee"];

async function main() {
  const wasi = new Proxy({}, { get: () => () => 0n });
  const { instance } = await WebAssembly.instantiate(
    await fetch("./anime.wasm?v=" + Date.now()).then(r => r.arrayBuffer()),
    { wasi_snapshot_preview1: wasi }
  );
  ex = instance.exports;
  try { ex._start(); } catch(_) {}
  const canvas = document.getElementById("c");
  function resize() {
    ex.set_size(window.innerWidth, window.innerHeight - 60);
    ex[DEMOS[demo]]();
  }
  resize();
  window.addEventListener("resize", () => resize());
  let last = performance.now();

  (function frame(now) {
    try {
      ex.update(Math.max(0, Math.min(now - last, 33)));
      last = now;
      draw(canvas);
    } catch(e) { console.error(e); }
    requestAnimationFrame(frame);
  })(performance.now());
}

function draw(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const count = N(ex.get_count());
  const W = window.innerWidth;
  const H = window.innerHeight - 60;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);

  // Title
  ctx.fillStyle = "#fff"; ctx.font = "bold 16px monospace";
  ctx.fillText("ceangal-anime", 20, 28);
  ctx.font = "11px monospace"; ctx.fillStyle = "#555";
  let subtitle = LABELS[demo][1];
  if (demo === 0) subtitle += " → " + SHAPES[N(ex.get_morph_shape())] + " (click to morph)";
  ctx.fillText(subtitle, 180, 28);

  for (let i = 0; i < count; i++) {
    const x = N(ex.get_x(B(i)));
    const y = N(ex.get_y(B(i)));
    const s = N(ex.get_scale(B(i)));
    const o = N(ex.get_opacity(B(i)));
    const h = N(ex.get_hue(B(i)));

    ctx.globalAlpha = Math.max(0.02, o);

    if (demo === 0) {
      // Morph: glowing particles
      const r = 3 + s * 3;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = `hsl(${h}, 80%, 65%)`; ctx.fill();
      if (s > 0.5) {
        const g = ctx.createRadialGradient(x, y, 0, x, y, r * 3);
        g.addColorStop(0, `hsla(${h}, 85%, 70%, ${o * 0.4})`);
        g.addColorStop(1, `hsla(${h}, 85%, 70%, 0)`);
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(x, y, r * 3, 0, Math.PI * 2); ctx.fill();
      }
    } else if (demo === 5) {
      // Camera: read projected coords
      const sx = N(ex.get_sx(B(i)));
      const sy = N(ex.get_sy(B(i)));
      const ss = N(ex.get_ss(B(i)));
      const so = N(ex.get_so(B(i)));
      if (ss > 0.5 && sx > -50) {
        ctx.globalAlpha = Math.max(0.05, so);
        const r = Math.max(1, ss);
        const hue2 = h;
        ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${hue2}, 70%, 60%)`; ctx.fill();
        // Glow
        if (r > 3) {
          const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 2.5);
          g.addColorStop(0, `hsla(${hue2}, 75%, 65%, ${so * 0.3})`);
          g.addColorStop(1, `hsla(${hue2}, 75%, 65%, 0)`);
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(sx, sy, r * 2.5, 0, Math.PI * 2); ctx.fill();
        }
      }
    } else if (demo === 1) {
      // Easing: ball on track
      const margin = W * 0.18;
      const trackW = W - margin - 40;
      ctx.fillStyle = "#666"; ctx.font = "11px monospace";
      ctx.fillText(EASE_NAMES[i] || "", 16, y + 14);
      ctx.fillStyle = "#111122";
      ctx.beginPath(); ctx.roundRect(margin, y, trackW, 24, 12); ctx.fill();
      ctx.fillStyle = PAL[i % 10] + "25";
      ctx.beginPath(); ctx.roundRect(margin, y, Math.max(0, x - margin), 24, 12); ctx.fill();
      ctx.beginPath(); ctx.arc(x, y + 12, 9, 0, Math.PI * 2);
      ctx.fillStyle = PAL[i % 10]; ctx.fill();
    } else if (demo === 2) {
      // Grid: circle
      const r = 14 * Math.max(0.05, s);
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = `hsl(${h}, 75%, 60%)`; ctx.fill();
      if (s > 0.4) {
        const g = ctx.createRadialGradient(x, y, 0, x, y, r * 2);
        g.addColorStop(0, `hsla(${h}, 80%, 65%, ${s * 0.25})`);
        g.addColorStop(1, `hsla(${h}, 80%, 65%, 0)`);
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(x, y, r * 2, 0, Math.PI * 2); ctx.fill();
      }
    } else if (demo === 3) {
      // Fireworks: particle + tail
      const r = 2 + s * 5;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = `hsl(${h}, 85%, 65%)`; ctx.fill();
      // Tail toward center
      const cx = 300, cy = 320;
      const dx = x - cx, dy = y - cy;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len > 5) {
        const tx = cx + dx * 0.6, ty = cy + dy * 0.6;
        ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(x, y);
        ctx.strokeStyle = `hsla(${h}, 80%, 60%, ${o * 0.3})`;
        ctx.lineWidth = r * 0.4; ctx.stroke();
      }
    } else {
      // Wave: vertical bar (baseY = H * 0.6, matches WASM)
      const baseY = H * 0.6;
      const barW = Math.max(2, (W - 40) / count - 1);
      const barH = Math.max(0, baseY - y);
      ctx.fillStyle = `hsl(${h}, 70%, 55%)`;
      ctx.fillRect(x, y, barW, barH);
      // Mirror
      ctx.globalAlpha = o * 0.25;
      ctx.fillRect(x, baseY, barW, barH * 0.4);
    }
  }
  ctx.globalAlpha = 1;
}

function go(n) {
  demo = n;
  ex.set_size(window.innerWidth, window.innerHeight - 60);
  ex[DEMOS[n]]();
  document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", i === n));
}

document.getElementById("c").addEventListener("click", () => {
  if (demo === 0) ex.morph_next();
});
main();
</script>
</body>
</html>
